# nlbwmon requests a 512 KiB receive buffer. Keep a little headroom so traffic
# accounting does not log a capped-buffer warning under load.
net.core.rmem_max=1048576

# Traffic enters and leaves through br-lan on this single-arm router. Do not
# tell clients to bypass it by accepting an ICMP redirect to the main router.
net.ipv4.conf.all.send_redirects=0
net.ipv4.conf.default.send_redirects=0
